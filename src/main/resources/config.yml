portals:
  enabled: true

economy:
  currency: coins

portal_item:
  material: END_PORTAL_FRAME
  display_name: "<gradient:#00AAFF:#55FFFF>Sell Portal</gradient>"
  lore:
    - "<gray>Place to create a sell portal for your island</gray>"
    - "<gray>Only one portal per island!</gray>"

portal_size: 3

gui:
  main:
    size: 27
    title: "<gradient:#00AAFF:#55FFFF>Sell Portal</gradient>"
    whitelist_slot: 12
    blacklist_slot: 14
    back_slot: 22
    pickup_slot: 16
    booster_slot: 10
  pickup_button:
    material: END_PORTAL_FRAME
    display_name: "<yellow>Pick Up Portal</yellow>"
    lore:
      - "<gray>Pick up this portal and move it</gray>"
  booster_button:
    material: EXPERIENCE_BOTTLE
    display_name: "<green>Sell Boosters</green>"
    lore:
      - "<gray>Click to view sell boosters</gray>"
  whitelist:
    size: 36
    title: "<gradient:#00AAFF:#55FFFF>Whitelist</gradient>"
  blacklist:
    size: 36
    title: "<gradient:#00AAFF:#55FFFF>Blacklist</gradient>"
  filler:
    material: BLACK_STAINED_GLASS_PANE
    display_name: " "
  back_button:
    material: BARRIER
    display_name: "<red>Back</red>"
  whitelist_button:
    material: LIME_DYE
    display_name: "<green>Whitelist</green>"
  blacklist_button:
    material: RED_DYE
    display_name: "<red>Blacklist</red>"
  boosters:
    size: 27
    title: "<gradient:#00AAFF:#55FFFF>Sell Boosters</gradient>"

sell_boosters:
  double_sell:
    slot: 12
    material: GOLDEN_APPLE
    display_name: "<gold>2x Sell Booster</gold>"
    lore:
      - "<gray>Multiplies sell prices by</gray> <gold>%multiplier%x</gold>"
      - "<gray>Duration:</gray> <gold>%duration%</gold>"
      - "<gray>Cooldown:</gray> <gold>%cooldown%</gold>"
    multiplier: 2.0
    duration: 1800
    cooldown: -1

tier:
  1:
    currency: levelxp
    amount: 100
