portals:
  enabled: true

portal_item:
  material: END_PORTAL_FRAME
  display_name: "<gradient:#00AAFF:#55FFFF>Sell Portal</gradient>"
  lore:
    - "<gray>Place to create a sell portal for your island</gray>"
    - "<gray>Only one portal per island!</gray>"

portal_size: 3

gui:
  main:
    size: 27
    title: "<gradient:#00AAFF:#55FFFF>Sell Portal</gradient>"
  whitelist:
    size: 27
    title: "<gradient:#00AAFF:#55FFFF>Whitelist</gradient>"
  blacklist:
    size: 27
    title: "<gradient:#00AAFF:#55FFFF>Blacklist</gradient>"
  boosters:
    size: 27
    title: "<gradient:#00AAFF:#55FFFF>Sell Boosters</gradient>"

  filler:
    material: BLACK_STAINED_GLASS_PANE
    display_name: " "

  pickup_button:
    slot: 16
    material: END_PORTAL_FRAME
    display_name: "<yellow>Pick Up Portal</yellow>"
    lore:
      - "<gray>Pick up this portal and move it</gray>"
  booster_button:
    slot: 10
    material: EXPERIENCE_BOTTLE
    display_name: "<green>Sell Boosters</green>"
    lore:
      - "<gray>Click to view sell boosters</gray>"
  back_button:
    slot: 22
    material: BARRIER
    display_name: "<red>Back</red>"
  whitelist_button:
    slot: 12
    material: LIME_DYE
    display_name: "<green>Whitelist</green>"
  blacklist_button:
    slot: 14
    material: RED_DYE
    display_name: "<red>Blacklist</red>"

sell_boosters:
  double_sell:
    slot: 10
    material: GOLDEN_APPLE
    display_name: "<gold>2x Sell Booster</gold>"
    lore:
      - "<gray>Multiplies sell prices by</gray> <gold>%multiplier%x</gold>"
      - ""
      - "<gray>Duration:</gray> <gold>%duration%</gold>"
      - ""
      - "<gray>Cooldown:</gray> <gold>%cooldown%</gold>"
      - ""
      - "<gray>Cost:</gray> <gold>%cost%</gold>"
    multiplier: 2.0
    duration: 1800
    cooldown: -1
    costs:
      coins: 100.0

  one_half:
    slot: 12
    material: ENCHANTED_GOLDEN_APPLE
    display_name: "<gradient:#FFAA00:#FF5500>1.5x Sell Booster</gradient>"
    lore:
      - "<gray>Multiplies sell prices by</gray> <gold>%multiplier%x</gold>"
      - ""
      - "<gray>Duration:</gray> <gold>%duration%</gold>"
      - "<gray>Cooldown:</gray> <gold>%cooldown%</gold>"
      - ""
      - "<gray>Cost:</gray> <gold>%cost%</gold>"
    multiplier: 1.5
    duration: 600
    cooldown: 300
    costs:
      coins: 25.0

  triple_sell:
    slot: 14
    material: BEACON
    display_name: "<gradient:#55FF55:#00AA00>3x Sell Booster</gradient>"
    lore:
      - "<gray>Multiplies sell prices by</gray> <gold>%multiplier%x</gold>"
      - ""
      - "<gray>Duration:</gray> <gold>%duration%</gold>"
      - "<gray>Cooldown:</gray> <gold>%cooldown%</gold>"
      - ""
      - "<gray>Cost:</gray> <gold>%cost%</gold>"
    multiplier: 3.0
    duration: 900
    cooldown: 1800
    costs:
      coins: 250.0
      levelxp: 50.0

  instant_boost:
    slot: 16
    material: FEATHER
    display_name: "<gradient:#AAAAFF:#5555FF>5x Flash Booster</gradient>"
    lore:
      - "<gray>Multiplies sell prices by</gray> <gold>%multiplier%x</gold>"
      - ""
      - "<gray>Duration:</gray> <gold>%duration%</gold>"
      - "<gray>Cooldown:</gray> <gold>%cooldown%</gold>"
      - ""
      - "<gray>Cost:</gray> <gold>%cost%</gold>"
    multiplier: 5.0
    duration: 60
    cooldown: 600
    costs:
      coins: 500.0
